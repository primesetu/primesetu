[pytest]
# Only collect from real test directories
testpaths = backend/tests scratch
norecursedirs = venv .venv .git __pycache__ node_modules backend/venv
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
# Suppress known framework deprecation noise
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore::DeprecationWarning:pytest_asyncio
