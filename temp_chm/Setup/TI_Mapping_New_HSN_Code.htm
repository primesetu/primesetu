<p class=Body-Text>On clicking <span class="hcp1">New HSN 
 Code</span> the <span class="hcp1">Tally Interface - HSN 
 Mapping</span> window extends to display the following fields.</p>

<p class=Body-Text><img src="ti%20-%20hsn%20mapping%20item%20classification%20-%20hsn%20screen%20-%20new%20code.gif"
						x-maintain-ratio=TRUE
						style="border: none;
								width: 550px;
								height: 342px;
								float: none;"
						width=550
						height=342
						border=0></p>

<p class=Body-Text><span class="hcp1">HSN Code</span>: Enter 
 the new HSN code.</p>

<p class=Body-Text><span class="hcp1">HSN Description</span>: 
 Enter the description for the HSN code.</p>

<p class=Navigation><span class="hcp1">Save New </span><span 
 style="x-text-underline: normal; font-weight: bold; /*begin!kadov{{*/ text-decoration: underline; /*}}end!kadov*/ ">H</span><span class="hcp1">SN</span>: To save the new HSN code details</p>

<p class=Navigation><span class="hcp1">Cancel</span>: To 
 quit the option</p>

<p class=Body-Text>&nbsp;</p>
