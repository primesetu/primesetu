<p class=Body-Text
	style="font-weight: normal;"><span style="font-weight: normal;">To 
 configure the Support.ini file,</span></p>

<ol>
	
	<li style="font-weight: normal;"
		class=kadov-p-CNumbered><p class=Numbered>Identify the the location 
 where Tally.ERP 9 is installed in the network</p></li>
	
	<li style="font-weight: normal;"
		class=kadov-p-CNumbered><p class=Numbered>Open the Support.ini 
 file </p></li>
	
	<li style="font-weight: normal;"
		class=kadov-p-CNumbered><p class=Numbered>Set the location path 
 of Tally.ERP 9 for<span class="hcp1"> TallyAppPath</span>. 
 For example,<span class="hcp1"> TallyAppPath=C:\Tally.ERP9</span></p></li>
</ol>
