<h1>PDT File Format Selection</h1>
<p class="Body-Text">The <span class="hcp1">Browse</span> window is as shown.</p>
<p style="margin-left: 0px;"><img src="GO_PDT_File_Format_Selection.gif" alt="" style="border: none;" width="285" height="210" border="0"></p>
<p class="Body-Text" style="margin-left: 7px;">Select the required format code by clicking on the row or alternatively type the code and click <span class="hcp1">Ok</span>.</p>
<p class="Navigation" style="margin-left: 19px;"><span class="hcp2">O</span><span class="hcp1">k</span>: To select the file format and close the Browse window</p>
<p class="Navigation" style="margin-left: 19px;"><span class="hcp2">C</span><span class="hcp1">ancel</span>: To close the Browse window without selecting any file format</p>
