    <script>
      // Safety guard: React DOM scheduler uses new MessageChannel() internally.
      // Ensure it is a valid constructor before React loads.
      if (typeof MessageChannel === 'undefined' || typeof MessageChannel !== 'function') {
        window.MessageChannel = function MessageChannel() {
          var self = this;
          this.port1 = { onmessage: null };
          this.port2 = { 
            onmessage: null, 
            postMessage: function(data) { 
              setTimeout(function() { 
                if (self.port1.onmessage) self.port1.onmessage({ data: data }); 
              }, 0); 
            } 
          };
        };
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
