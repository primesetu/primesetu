<h1>Replacing Data</h1>
<p class="Body-Text">The <span class="hcp1">Replace Data</span> window is as shown.</p>
<p class="Body-Text">&#160;<img src="items_replace_1.gif" alt="" style="border: none;" width="500" height="232" border="0"></p>
<p class="Body-Text">Select the field names in the list. The selected fields are listed in the grid. Enter values for the field <span class="hcp1">Replace Data With</span>.</p>
<p class="Navigation"><span class="hcp2">5</span><span class="hcp1">.Cancel</span>: To cancel the values entered</p>
<p class="Navigation"><span class="hcp2">6</span><span class="hcp1">.Apply</span>: To replace the fields with values entered</p>
