<p class=Body-Text
	style="margin-left: 7px;">Select the required format code by clicking 
 on the row or alternatively type the code and click <span class="hcp1">Ok</span>.</p>

<p class=Navigation
	style="margin-left: 19px;"><span class="hcp2">O</span><span class="hcp1">k</span>: To select the file format and close 
 the Browse window</p>

<p class=Navigation
	style="margin-left: 19px;"><span class="hcp2">C</span><span class="hcp1">ancel</span>: To close the Browse window without 
 selecting any file format</p>
